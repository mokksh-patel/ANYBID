<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — AnyBid</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-top">
      <a href="/" class="logo">Any<span>Bid</span></a>
    </div>
  </header>
  <main class="auth-page">
    <div class="auth-card">
      <h1>Login</h1>
      <p class="sub">Welcome back to India's anything auction bazaar</p>
      <div id="alert"></div>
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required placeholder="you@email.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Login</button>
      </form>
      <p style="margin-top:1rem;text-align:center;font-size:0.9rem">
        New here? <a href="/register.html">Create account</a>
      </p>
    </div>
  </main>
  <script src="/js/api.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      try {
        const data = await api('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email: fd.get('email'), password: fd.get('password') }),
        });
        setToken(data.token);
        setUser(data.user);
        location.href = '/';
      } catch (err) {
        document.getElementById('alert').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    });
  </script>
</body>
</html>
