<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — AnyBid</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-top">
      <a href="/" class="logo"><div class="logo-icon">B</div> Any<span>Bid</span></a>
    </div>
  </header>
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">B</div>
        <h1 style="margin-top:.5rem">Welcome back</h1>
        <p class="sub">India's live auction marketplace</p>
      </div>
      <div id="alert"></div>
      <form id="login-form">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required placeholder="you@email.com" autocomplete="email" />
        <label for="password" style="margin-top:.9rem">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
        <button type="submit" class="btn btn-dark btn-block" style="margin-top:1.25rem" id="submit-btn">Login</button>
      </form>
      <p style="margin-top:1.25rem;text-align:center;font-size:.875rem;color:var(--muted)">
        New here? <a href="/register.html" style="font-weight:700">Create account</a>
      </p>
    </div>
  </main>
  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.textContent = 'Logging in…'; btn.disabled = true;
      const fd = new FormData(e.target);
      try {
        const data = await api('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email: fd.get('email'), password: fd.get('password') }),
        });
        setToken(data.token); setUser(data.user);
        showToast('Welcome back, ' + data.user.name + '!', 'success');
        setTimeout(() => location.href = '/', 800);
      } catch (err) {
        document.getElementById('alert').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
        btn.textContent = 'Login'; btn.disabled = false;
      }
    });
  </script>
</body>
</html>
